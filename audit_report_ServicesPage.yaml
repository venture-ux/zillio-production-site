      # HIGH VIOLATIONS
      - id: "HIGH-001"
        type: "missing_font_weight"
        severity: "HIGH"
        line: 52
        expected: "font-black (900 weight) for hero display"
        actual: "font-light (300 weight)"
        impact: "Hero lacks visual impact, appears too subtle"
        points_deducted: -10
        fix: "Change font-light → font-black on line 52"

      - id: "HIGH-002"
        type: "wrong_hero_text_size"
        severity: "HIGH"
        line: 52
        expected: "text-4xl md:text-7xl (correct mobile scaling)"
        actual: "text-5xl md:text-7xl (too large on mobile)"
        impact: "Hero text too large on mobile compared to golden standard"
        points_deducted: -8
        fix: "Change text-5xl → text-4xl on line 52"

      - id: "HIGH-003"
        type: "missing_hero_height"
        severity: "HIGH"
        line: 40
        expected: "h-screen min-h-[700px] for hero section"
        actual: "No height constraint (content-based)"
        impact: "Hero may appear short on large viewports"
        points_deducted: -7
        fix: "Add h-screen min-h-[700px] to section on line 40"

      # MEDIUM VIOLATIONS
      - id: "MED-003"
        type: "wrong_text_color"
        severity: "MEDIUM"
        line: [59, 64, 114]
        expected: "text-gray-800 for body text on light backgrounds"
        actual: "text-gray-400 (too light, low contrast)"
        impact: "Readability reduced, fails WCAG AA contrast ratio"
        points_deducted: -8
        fix: "Replace all text-gray-400 → text-gray-800 on lines 59, 64, 114"

      # LOW VIOLATIONS
      - id: "LOW-001"
        type: "inconsistent_border_opacity"
        severity: "LOW"
        line: 78
        expected: "border-white/10 or rgba(255,255,255,0.10)"
        actual: "rgba(0,0,0,0.15) (black border)"
        impact: "Minor inconsistency in secondary button border"
        points_deducted: -3
        notes: "Black border works on white background but not aligned with standard white borders"

      - id: "LOW-002"
        type: "missing_specific_transition"
        severity: "LOW"
        line: 71
        expected: "transition-colors duration-300"
        actual: "transition-all (less specific)"
        impact: "Transition works but not performance-optimized"
        points_deducted: -2
        fix: "Change transition-all → transition-colors duration-300 on line 71"


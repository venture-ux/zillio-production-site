    links_section: "px-8 md:px-20 py-16 md:py-20"
    newsletter_divider: "border-t border-white/10 pt-10"
    bottom_bar: "border-t border-white/10 px-8 md:px-20 py-6"
    input_field: "text-white text-xs px-5 py-3.5 flex-1 md:w-72 focus:outline-none placeholder-white/25 font-light"
    input_bg: "rgba(255,255,255,0.05)"
    input_border: "1px solid rgba(255,255,255,0.12)"

# ========================================
# 6. ANIMATION & MOTION (13 tokens)
# ========================================
animations:
  # Scroll Animations (Framer Motion)
  fade_in:
    initial: "opacity: 0, y: 30"
    whileInView: "opacity: 1, y: 0"
    viewport: "once: true, margin: -10%"
    duration: 0.8
    easing: "[0.16, 1, 0.3, 1]"  # Custom cubic-bezier

  # Hover Animations
  hover:
    card_scale: "scale(1.02)"
    card_duration: 0.4
    image_scale: "scale(1.1)"
    image_duration: 2.0
    button_scale: "scale(1.1)"
    divider_scale_x: "scaleX(1.5)"
    divider_origin: "left"

  # Transitions
  transitions:
    nav_scroll: "duration-500"  # Navigation background on scroll
    colors: "duration-300"
    opacity: "transition-opacity"
    transform: "duration-300"
    all: "duration-500"

  # Carousel Transitions
  carousel_fade:
    initial: "opacity: 0, scale: 1.05"
    animate: "opacity: 1, scale: 1"
    duration: 1.0
    easing: "[0.16, 1, 0.3, 1]"

  # Parallax Effect
  parallax:
    mouse_tracking: "transform: translate(${x * 0.01}px, ${y * 0.01}px) scale(1.05)"
    spring_config: "stiffness: 50, damping: 20"

# ========================================
# 7. GRADIENTS & EFFECTS (12 tokens)
# ========================================
effects:
  # Background Gradients
  gradients:
    hero_overlay: "bg-gradient-to-b from-black/50 via-transparent to-black/80"
    section_transition_top: "bg-gradient-to-t from-[#f6f5f1] via-transparent to-transparent"
    section_transition_bottom: "bg-gradient-to-b from-[#f6f5f1] via-transparent to-[#050505]"
    carousel_overlay: "bg-gradient-to-t from-black/90 via-black/20 to-black/40"
    card_overlay: "bg-gradient-to-t from-black/95 via-black/40 to-transparent"
    video_overlay: "bg-black/30 group-hover:bg-black/10"
    nav_default: "linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, transparent 100%)"

  # Backdrop Effects
  backdrop:

# ========================================
# 8. BRAND VIOLATIONS TO DETECT (24 tokens)
# ========================================
violations_to_detect:
  catastrophic:
    - type: "theme_inversion"
      description: "Dark theme (#000000) used on light-themed page or vice versa"
      severity: "CATASTROPHIC"
      points: -30
      example: "bg-black on a cream page, or bg-[#f6f5f1] on black page"

    - type: "wrong_primary_font"
      description: "Font family other than 'Outfit' or fallback sans-serif"
      severity: "CATASTROPHIC"
      points: -25
      example: "font-family: 'Roboto' instead of 'Outfit'"

    - type: "wrong_gold_color"
      description: "Accent color other than #c9a76c for eyebrows/dividers"
      severity: "CATASTROPHIC"
      points: -25
      example: "Using #FFD700 or any gold shade except #c9a76c"

  critical:
    - type: "missing_eyebrow_divider"
      description: "Section header without gold divider line"
      severity: "CRITICAL"
      points: -20
      pattern: "w-px h-16 bg-[#c9a76c] OR w-12 h-px bg-[#c9a76c]"

    - type: "wrong_eyebrow_tracking"
      description: "Eyebrow label without tracking-[0.3em] or tracking-[0.2em]"
      severity: "CRITICAL"
      points: -15
      correct: "tracking-[0.3em] for large, tracking-[0.2em] for small"

    - type: "missing_uppercase_transform"
      description: "Eyebrow or nav label without uppercase transform"
      severity: "CRITICAL"
      points: -15

    - type: "wrong_section_padding"
      description: "Section padding not py-24 or py-32"
      severity: "CRITICAL"
      points: -15
      correct: "py-32 for main sections, py-24 for standard"

  high:
    - type: "wrong_button_tracking"
      description: "Primary button without tracking-widest"
      severity: "HIGH"
      points: -12
      correct: "tracking-widest for primary, tracking-[0.15em] for outlined"

    - type: "wrong_hero_letter_spacing"
      description: "Hero heading without letterSpacing: -0.04em or -0.03em"
      severity: "HIGH"
      points: -12
      correct: "-0.04em for ultra-large, -0.03em for large"

    - type: "wrong_overlay_gradient"
      description: "Hero/carousel without proper gradient overlay"
      severity: "HIGH"
      points: -10
      correct: "bg-gradient-to-b from-black/50 via-transparent to-black/80"

    - type: "wrong_nav_height"
      description: "Navigation height not h-[70px]"
      severity: "HIGH"
      points: -10

    - type: "missing_font_weight"
      description: "Hero without font-black, body without font-light"
      severity: "HIGH"
      points: -10
      correct: "font-black (900) for hero, font-light (300) for body"

  medium:
    - type: "wrong_gap_spacing"
      description: "Grid gap not gap-12 lg:gap-20"
      severity: "MEDIUM"
      points: -8
      correct: "gap-12 lg:gap-20 for content, gap-7 xl:gap-9 for nav"

    - type: "wrong_max_width"
      description: "Container max-width not using standard values"
      severity: "MEDIUM"
      points: -8
      correct: "max-w-5xl, max-w-6xl, max-w-7xl, max-w-4xl only"

    - type: "missing_transition"
      description: "Interactive element without transition classes"
      severity: "MEDIUM"
      points: -7
      correct: "transition-colors, transition-opacity, transition-all"

    - type: "wrong_carousel_dot_width"
      description: "Active carousel dot not 32px width"
      severity: "MEDIUM"
      points: -6
      correct: "32px active, 8px inactive, 3px height"

  low:
    - type: "wrong_border_opacity"
      description: "Border color not using standard rgba values"
      severity: "LOW"
      points: -5
      correct: "border-white/10, border-white/5, rgba(255,255,255,0.06), etc."

    - type: "inconsistent_backdrop_blur"
      description: "Backdrop blur not using backdrop-blur-sm or blur(20px)"
      severity: "LOW"
      points: -4

    - type: "missing_hover_state"
      description: "Button or link without hover state"
      severity: "LOW"
      points: -3

    - type: "wrong_icon_stroke"
      description: "Icon strokeWidth not 1.5"
      severity: "LOW"
      points: -3
      correct: "strokeWidth={1.5} for all Lucide icons"

    - type: "inconsistent_rounded_corners"
      description: "Buttons not using rounded-full or rounded-sm"
      severity: "LOW"
      points: -2
      correct: "rounded-full for primary buttons, rounded-sm for images"

# ========================================
# 9. SCORING SYSTEM (100 points total)
# ========================================
scoring:
  total_points: 100

  breakdown:
    typography_compliance: 25
      # - Correct font family (Outfit): 10 pts
      # - Correct weights (black/light/bold): 8 pts
      # - Correct tracking/letter-spacing: 7 pts

    color_compliance: 20
      # - Gold accent (#c9a76c) correct: 8 pts
      # - Background colors correct: 7 pts
      # - Text opacity levels correct: 5 pts

    spacing_compliance: 15
      # - Section padding (py-24/py-32): 6 pts
      # - Container max-width correct: 5 pts
      # - Gap spacing correct: 4 pts

    component_patterns: 20
      # - Eyebrow divider present: 8 pts
      # - Button styles correct: 7 pts
      # - Navigation structure correct: 5 pts

    animation_effects: 10
      # - Transitions present: 5 pts
      # - Hover states correct: 3 pts
      # - Motion easing correct: 2 pts

    layout_structure: 10
      # - Grid systems correct: 5 pts
      # - Section heights correct: 3 pts
      # - Z-index layering correct: 2 pts

  grading_scale:
    S_tier: "95-100 points (Perfect brand consistency)"
    A_tier: "85-94 points (Excellent, minor violations)"
    B_tier: "70-84 points (Good, some violations)"
    C_tier: "50-69 points (Acceptable, multiple violations)"
    D_tier: "30-49 points (Poor, major violations)"
    F_tier: "0-29 points (Fail, catastrophic violations)"


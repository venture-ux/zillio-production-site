# ========================================
# 1. TYPOGRAPHY SYSTEM (32 tokens)
# ========================================
typography:
  families:
    primary: "'Outfit', sans-serif"  # Main brand font
    fallback: "sans-serif"
    serif: "font-serif"  # Used for quotes/testimonials
    import_url: "https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"

  # Hero & Display Headings
  headings:
    hero_display:
      size: "text-[12vw]"  # Viewport-based, ultra-large
      weight: "font-black"  # 900
      tracking: "tracking-tighter"
      letter_spacing: "-0.04em"
      line_height: "leading-none"
      transform: "uppercase"
      text_shadow: "0 10px 30px rgba(0,0,0,0.3)"
      example: "THE LINE"

    section_large:
      size: "text-5xl md:text-7xl"
      weight: "font-light"  # 300
      tracking: "tracking-[0.2em]"
      letter_spacing: "0.15em"
      line_height: "leading-[1.1]"
      transform: "uppercase"
      example: "A Revolution in Civilization"

    section_hero_black:
      size: "text-4xl md:text-7xl"
      weight: "font-black"  # 900
      tracking: "tracking-tighter"
      letter_spacing: "-0.03em"
      line_height: "leading-none"
      transform: "uppercase"
      example: "DESIGNED TO DELIVER NEW WONDERS"

  # Body & Descriptive Text
  body:
    large:
      size: "text-2xl md:text-3xl"
      weight: "font-light"  # 300
      line_height: "leading-relaxed"
      color: "text-gray-800"
      max_width: "max-w-4xl"
      example: "Intro paragraphs in light sections"

    medium:
      size: "text-xl md:text-2xl"
      weight: "font-light"  # 300
      line_height: "leading-relaxed"
      color: "text-gray-700"
      example: "Secondary paragraphs"

  # Labels & Eyebrows
  labels:
    eyebrow_large:
      size: "text-xs md:text-sm"
      weight: "font-bold"  # 700
      tracking: "tracking-[0.3em]"
      transform: "uppercase"
      color: "#c9a76c"  # Gold accent
      margin_bottom: "mb-10"
      example: "The Future of Urban Living"

    eyebrow_small:
      size: "text-[11px]"
      weight: "font-bold"  # 700
      tracking: "tracking-[0.3em]"
      transform: "uppercase"
      color: "#c9a76c"
      margin_bottom: "mb-5 md:mb-6"
      example: "THIS IS THE LINE"

    eyebrow_tiny:
      size: "text-[10px]"
      weight: "font-bold"  # 700
      tracking: "tracking-[0.2em]"
      transform: "uppercase"
      color: "text-white"
      example: "NEOM badge in hero"

  # Navigation Typography
  nav:
    primary:
      size: "text-xs"
      weight: "font-light"  # 300
      tracking: "tracking-[0.18em]"
      transform: "uppercase"
      opacity: "opacity-80 hover:opacity-100"
      transition: "transition-opacity"

    dropdown:
      size: "text-xs"
      weight: "font-light"
      tracking: "tracking-[0.15em]"
      transform: "uppercase"
      color: "text-white/50 hover:text-white"
      transition: "transition-colors"
      whitespace: "whitespace-nowrap"

  # Button Typography
  buttons:
    primary:
      size: "text-xs"
      weight: "font-bold"  # 700
      tracking: "tracking-widest"
      transform: "uppercase"

    cta:
      size: "text-xs"
      weight: "font-medium"  # 500
      tracking: "tracking-[0.15em]"
      transform: "uppercase"

  # Footer Typography
  footer:
    category_heading:
      size: "text-xs"
      weight: "font-medium"  # 500
      tracking: "tracking-[0.2em]"
      transform: "uppercase"
      color: "text-white/80"
      margin_bottom: "mb-6"

    link:
      size: "text-xs"
      weight: "font-light"  # 300
      tracking: "tracking-wide"
      color: "text-white/35 hover:text-white/70"
      transition: "transition-colors"

    small_text:
      size: "text-xs"
      weight: "font-light"
      color: "text-white/30"

  # Quote/Testimonial
  quote:
    text:
      size: "text-2xl md:text-4xl"
      weight: "font-light"  # 300
      line_height: "leading-relaxed"
      style: "italic"
      color: "text-white/90"
      family: "font-serif"
      margin_bottom: "mb-14"


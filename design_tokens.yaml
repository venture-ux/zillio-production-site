# ========================================
components:
  # Hero Section
  hero:
    wrapper: "relative h-screen w-full flex items-center justify-center pt-20"
    image: "absolute inset-0 w-full h-full object-cover opacity-80"
    overlay: "absolute inset-0 bg-gradient-to-b from-black/50 via-transparent to-black/80"
    content_wrapper: "relative z-10 text-center flex flex-col items-center mt-10"
    badge_circle: "w-14 h-14 mb-8 rounded-full border border-white/20 flex items-center justify-center backdrop-blur-sm"
    badge_bg: "rgba(255,255,255,0.05)"

  # Section Headers (Eyebrow Pattern)
  section_header:
    divider: "w-px h-16 bg-[#c9a76c] mx-auto mb-8"  # Vertical gold line
    divider_horizontal: "w-12 h-px bg-[#c9a76c] mb-6 md:mb-8"  # Horizontal gold line
    divider_animated: "h-px bg-[#c9a76c]"  # Animated expanding line (48px → 80px)
    eyebrow_wrapper: "text-center mb-20 md:mb-24"

  # Buttons
  buttons:
    primary:
      classes: "px-8 py-3.5 bg-white text-black text-xs font-bold tracking-widest uppercase rounded-full hover:bg-[#c9a76c] hover:text-white transition-colors duration-300 shadow-xl"
      states:
        default: "bg-white text-black"
        hover: "bg-[#c9a76c] text-white"
      animation: "transition-colors duration-300"

    outlined:
      classes: "text-white text-xs px-5 py-2.5 tracking-[0.15em] uppercase font-light hover:bg-white hover:text-black transition-all duration-250"
      border: "1px solid rgba(255,255,255,0.4)"
      states:
        default: "text-white"
        hover: "bg-white text-black"

    footer_subscribe:
      classes: "bg-white text-black text-xs px-6 py-3.5 font-medium tracking-[0.15em] uppercase hover:bg-white/90 transition-colors whitespace-nowrap"

  # Cards (Revolution Section)
  cards:
    wrapper: "relative group overflow-hidden border-r border-white/5 last:border-r-0 h-[400px] xl:h-full cursor-pointer"
    image: "absolute inset-0 w-full h-full object-cover opacity-50 group-hover:opacity-100"
    overlay: "absolute inset-0 bg-gradient-to-t from-black/95 via-black/40 to-transparent p-10 flex flex-col justify-end transition-all duration-500"
